<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accio World Cup 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.3);
        }
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #FFD966, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 50px;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        h1 {
            color: #FFD966;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(105deg, #FFD966, #FFA500);
            color: #0a0a0a;
            padding: 14px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,200,50,0.4);
        }
        .note {
            font-size: 0.7rem;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span>⚽</span>
        </div>
        <h1>آکسیو · جام جهانی ۲۰۲۶</h1>
        <p>سامانه پیش‌بینی مسابقات جام جهانی<br>با جایزه و رقابت لحظه‌ای</p>
        <a href="https://script.google.com/macros/s/AKfycbwL6gNPqoHWiQEBIrrwSoHXFxnIkqPhgd4qh4a9U7dIT1W7aONO202axsSNU3FILZ4n/exec" class="btn">ورود به سامانه</a>
        <div class="note">با کلیک روی دکمه وارد سامانه آکسیو می‌شوید</div>
    </div>
</body>
</html>
